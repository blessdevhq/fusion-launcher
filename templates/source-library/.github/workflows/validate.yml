name: Validate Fusion Launcher source library

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source library
        uses: actions/checkout@v4
        with:
          path: source-library

      - name: Checkout Fusion Launcher validator
        uses: actions/checkout@v4
        with:
          repository: YOUR_ORG_OR_USER/fusion-launcher
          path: fusion-launcher-validator

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: fusion-launcher-validator/package-lock.json

      - name: Install validator dependencies
        working-directory: fusion-launcher-validator
        run: npm ci

      - name: Validate repository JSON
        working-directory: fusion-launcher-validator
        run: npm run source:validate -- ../source-library/repository.json
