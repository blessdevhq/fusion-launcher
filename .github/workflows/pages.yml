name: Source Template Pages

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/pages.yml'
      - 'README.md'
      - 'README.ru.md'
      - 'docs/source-library-template.md'
      - 'package-lock.json'
      - 'package.json'
      - 'public/fusion/**'
      - 'scripts/build-source-template-pages.mjs'
      - 'scripts/validate-source-library.mjs'
      - 'src/types/repository.ts'
      - 'templates/source-library/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: source-template-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source template
        run: npm run source:validate -- templates/source-library/repository.json

      - name: Check source template artifact
        run: npm run source:template:check

      - name: Build Pages artifact
        run: npm run pages:build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
